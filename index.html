<!DOCTYPE html>
<html lang="en" data-i18n="{\"lang\": \"en\"}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="{\"title\": \"Multilingual Accounting Website\"}"></title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#" data-i18n="{\"home\": \"Home\"}">Home</a></li>
                <li><a href="#services" data-i18n="{\"services\": \"Services\"}">Services</a></li>
                <li><a href="#pricing" data-i18n="{\"pricing\": \"Pricing\"}">Pricing</a></li>
                <li><a href="#contact" data-i18n="{\"contact\": \"Contact\"}">Contact</a></li>
            </ul>
        </nav>
        <section class="hero">
            <h1 data-i18n="{\"hero_title\": \"Your Trusted Accounting Partner\"}"></h1>
            <p data-i18n="{\"hero_description\": \"Providing comprehensive financial services to businesses of all sizes.\"}"></p>
        </section>
    </header>
    <main>
        <section id="services">
            <h2 data-i18n="{\"our_services\": \"Our Services\"}"></h2>
            <ul>
                <li data-i18n="{\"service1\": \"Tax Preparation\"}"></li>
                <li data-i18n="{\"service2\": \"Bookkeeping\"}"></li>
                <li data-i18n="{\"service3\": \"Financial Consulting\"}"></li>
            </ul>
        </section>
        <section id="pricing">
            <h2 data-i18n="{\"pricing_plans\": \"Pricing Plans\"}"></h2>
            <table>
                <tr>
                    <th data-i18n="{\"plan\": \"Plan\"}"></th>
                    <th data-i18n="{\"price\": \"Price\"}"></th>
                </tr>
                <tr>
                    <td data-i18n="{\"basic_plan\": \"Basic Plan\"}"></td>
                    <td data-i18n="{\"basic_price\": \"$100\"}"></td>
                </tr>
                <tr>
                    <td data-i18n="{\"premium_plan\": \"Premium Plan\"}"></td>
                    <td data-i18n="{\"premium_price\": \"$200\"}"></td>
                </tr>
            </table>
        </section>
        <section id="contact">
            <h2 data-i18n="{\"contact_us\": \"Contact Us\"}"></h2>
            <form>
                <label for="name" data-i18n="{\"name\": \"Name\"}"></label>
                <input type="text" id="name" name="name" required>
                <label for="email" data-i18n="{\"email\": \"Email\"}"></label>
                <input type="email" id="email" name="email" required>
                <label for="message" data-i18n="{\"message\": \"Message\"}"></label>
                <textarea id="message" name="message" required></textarea>
                <button type="submit" data-i18n="{\"send\": \"Send\"}"></button>
            </form>
        </section>
    </main>
    <footer>
        <p data-i18n="{\"footer_text\": \"© 2026 Multilingual Accounting. All rights reserved.\"}"></p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
